<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#4e54c8,#8f94fb);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box{
    width: 360px;
    background: #222;
    padding: 20px;
    border-radius: 15px;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.sbox{
    height: 65px;
    background: #444;
    color: white;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    cursor: pointer;
    transition: 0.3s;
    user-select: none;
}

.sbox:hover{
    background: #666;
    transform: scale(1.05);
}

.sbox:active{
    transform: scale(0.95);
}

#screen{
    grid-column: 1/5;
    height: 90px;
    background: #111;
    color: #00ff99;
    font-size: 35px;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 15px;
    border-radius: 10px;
    overflow: hidden;
    word-wrap: break-word;
}
        


    </style>
</head>
<body>

    <div class="box">
        <div class="sbox" onclick='0' id="screen"></div>
        <div class="sbox" onclick="cal('7')">7</div>
        <div class="sbox" onclick="cal('8')">8</div>
        <div class="sbox" onclick="cal('9')">9</div>
        <div class="sbox" onclick="cal('x')">x</div>
        <div class="sbox" onclick="cal('4')">4</div>
        <div class="sbox" onclick="cal('5')">5</div>
        <div class="sbox" onclick="cal('6')">6</div>
        <div class="sbox" onclick="cal('/')">/</div>
        <div class="sbox" onclick="cal('1')">1</div>
        <div class="sbox" onclick="cal('2')">2</div>
        <div class="sbox" onclick="cal('3')">3</div>
        <div class="sbox" onclick="cal('+')">+</div>
        <div class="sbox" onclick="cal('.')">.</div>
        <div class="sbox" onclick="cal('0')">0</div>
        <div class="sbox" onclick="cal('=')">=</div>
        <div class="sbox" onclick="cal('-')">-</div>

        <script>


            let screentxt=document.getElementById("screen").innerText;

            function screenupdate(txt){
                
                screentxt +=txt
                console.log(screentxt);
                document.getElementById("screen").innerText=screentxt
            }

            function cal(btn){
                
                switch(btn){

                    case '1':
                        screenupdate('1');
                        break;
                    case '2':
                        screenupdate('2')
                        break
                    case '3':
                        screenupdate('3')
                        break
                    case '4':
                        screenupdate('4')
                        break
                    case '5':
                        screenupdate('5')
                        break
                    case '6':
                        screenupdate('6')
                        break
                    case '7':
                        screenupdate('7')
                        break
                    case '8':
                        screenupdate('8')
                        break
                    case '9':
                        screenupdate('9')
                        break
                    case '0':
                        screenupdate('0')
                    case '.':
                        screenupdate('.')
                        break
                    case '+':
                        screenupdate('+')
                        break
                    case '-':
                        screenupdate('-')
                        break
                    case 'x':
                        screenupdate('*')
                        break
                    case '/':
                        screenupdate('/')
                        break
                    case '=':
                        //screenupdate('=')
                        let temp=document.getElementById("screen").innerText;
                        temp=eval(temp)
                        console.log(temp);
                        document.getElementById("screen").innerText=temp
                        break

                }
            }
        </script>
        
    </div>
    
</body>
</html>
